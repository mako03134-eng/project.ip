<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>지도</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    position: relative;
  }
  #map {
    height: 100vh;
    width: 100%;
  }
  #find-me-btn {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 1000;
    padding: 14px 28px;
    font-size: 16px;
    font-weight: bold;
    background-color: #3498db;
    color: white;
    border: none;
    border-radius: 30px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    cursor: pointer;
    transition: all 0.2s ease;
  }
  #find-me-btn:hover {
    background-color: #2980b9;
    box-shadow: 0 6px 20px rgba(0,0,0,0.3);
  }
</style>
</head>
<body>

<button id="find-me-btn">내 위치 확인하기</button>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="app.js"></script>
</body>
</html>
